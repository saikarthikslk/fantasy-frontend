<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Cricket fantasy game — build your dream team of 11 players for each match, Dream11-style."
    />
    <title>FantasyF — cricket fantasy & dream teams</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Legacy HashRouter redirect: /#/matches/123?x=1 → /matches/123?x=1
      (function () {
        var h = window.location.hash;
        if (h.length > 2 && h.charAt(1) === "/") {
          var rest = h.slice(1);
          window.history.replaceState(null, "", window.location.pathname.replace(/\/$/, "") + rest);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
